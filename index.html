<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Straight-A Sessions — Aiden McBroom</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --ink: #1a1612;
    --ember: #c84b1a;
    --ash: #7a7068;
    --paper: #ede8de;
  }

  html, body {
    min-height: 100%;
    background: var(--ink);
    color: var(--cream);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    position: relative;
  }

  /* decorative ruled lines */
  .rule-top, .rule-bottom {
    position: absolute;
    left: 40px;
    right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--ash) 20%, var(--ash) 80%, transparent);
    opacity: 0.3;
  }
  .rule-top { top: 40px; }
  .rule-bottom { bottom: 40px; }

  /* corner marks */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    opacity: 0.4;
  }
  .corner--tl { top: 32px; left: 32px; border-top: 1px solid var(--ash); border-left: 1px solid var(--ash); }
  .corner--tr { top: 32px; right: 32px; border-top: 1px solid var(--ash); border-right: 1px solid var(--ash); }
  .corner--bl { bottom: 32px; left: 32px; border-bottom: 1px solid var(--ash); border-left: 1px solid var(--ash); }
  .corner--br { bottom: 32px; right: 32px; border-bottom: 1px solid var(--ash); border-right: 1px solid var(--ash); }

  .inner {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }

  /* flame SVG */
  .flame-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 36px;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.9s ease forwards 0.1s;
  }

  .flame-wrap svg {
    animation: flicker 3s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { transform: scaleY(1) scaleX(1); }
    25% { transform: scaleY(1.04) scaleX(0.97); }
    50% { transform: scaleY(0.97) scaleX(1.02); }
    75% { transform: scaleY(1.03) scaleX(0.98); }
  }

  /* match stick below flame */
  .match-stick {
    width: 2px;
    height: 48px;
    background: linear-gradient(to bottom, #5a3a20, #3a2510);
    margin: 0 auto;
    border-radius: 1px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.2s;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ember);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.4s;
  }

  h1 {
    font-size: clamp(42px, 8vw, 68px);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--cream);
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.5s;
  }

  h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--paper);
  }

  .subtitle {
    font-size: 15px;
    font-weight: 300;
    color: var(--ash);
    letter-spacing: 0.04em;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.65s;
  }

  /* divider */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--ember);
    margin: 0 auto 48px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.7s;
  }

  .tagline {
    font-size: 18px;
    font-weight: 300;
    font-style: italic;
    color: var(--paper);
    line-height: 1.6;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.8s;
  }

  /* contact links */
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.95s;
  }

  .contact-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    border-bottom: 1px solid rgba(122, 112, 104, 0.2);
    text-decoration: none;
    color: var(--cream);
    transition: color 0.2s ease;
    cursor: pointer;
  }

  .contact-item:first-child {
    border-top: 1px solid rgba(122, 112, 104, 0.2);
  }

  .contact-item:hover {
    color: var(--ember);
  }

  .contact-item:hover .contact-arrow {
    transform: translateX(4px);
    color: var(--ember);
  }

  .contact-left {
    display: flex;
    align-items: center;
    gap: 16px;
    text-align: left;
  }

  .contact-icon {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(122, 112, 104, 0.35);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s ease;
  }

  .contact-item:hover .contact-icon {
    border-color: var(--ember);
  }

  .contact-icon svg {
    width: 15px;
    height: 15px;
  }

  .contact-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ash);
    margin-bottom: 3px;
    transition: color 0.2s ease;
  }

  .contact-item:hover .contact-label {
    color: var(--ember);
  }

  .contact-value {
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.01em;
  }

  .contact-arrow {
    color: var(--ash);
    font-size: 18px;
    transition: transform 0.2s ease, color 0.2s ease;
    flex-shrink: 0;
  }

  .footer-note {
    margin-top: 52px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(122, 112, 104, 0.5);
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 1.1s;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .rule-top, .rule-bottom, .corner { display: none; }
    .page { padding: 40px 20px; }
  }
</style>
</head>
